version: '3.8'

services:
  # 1. Database Service (PostgreSQL)
  postgres:
    image: postgres:15-alpine
    container_name: forex_postgres
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${DB_PASSWORD:-H4CK3R123!}
      - POSTGRES_DB=ForexBotAI
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

  # 2. Backend Service (NestJS)
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: forex_backend
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - DATABASE_URL=postgresql://postgres:${DB_PASSWORD:-H4CK3R123!}@postgres:5432/ForexBotAI?schema=public
      - JWT_SECRET=${JWT_SECRET}
    depends_on:
      - postgres
    restart: always

volumes:
  postgres_data: # Definisikan volume untuk penyimpanan data permanen
